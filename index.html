<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ESP32 Dashboard</title>

<style>
body{
  background:#020617;
  color:#e2e8f0;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:420px;
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 30px rgba(0,0,0,0.8);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  background:#020617;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  text-align:center;
}

.big{
  font-size:42px;
  transition: all .2s ease;
}

.bar{
  height:10px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#22c55e,#4ade80);
  transition: width .5s ease;
}

/* 🔥 TOAST */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-50px);
  background:#22c55e;
  color:black;
  padding:10px 20px;
  border-radius:10px;
  font-weight:bold;
  opacity:0;
  transition:.4s;
  z-index:999;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

/* animación datos */
.updated{
  transform:scale(1.15);
  color:#22c55e;
}
</style>
</head>

<body>

<div class="toast" id="toast">🔄 Actualizado</div>

<div class="container">
  <h1>🌡️ ESP32</h1>

  <div class="card">
    <div class="big" id="temp">-- °C</div>
  </div>

  <div class="card">
    <div class="big" id="hum">-- %</div>
    <div class="bar"><div class="fill" id="bar"></div></div>
  </div>

  <div class="card" id="clima">--</div>

  <div class="card">
    <div id="avg">--</div>
  </div>

  <div class="card">
    <div id="maxmin">--</div>
  </div>

  <div class="card">
    <div id="last">--</div>
  </div>
</div>

<!-- sonido -->
<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

const URL = "https://raw.githubusercontent.com/manumartinezmm00-ctrl/detector/main/data.txt";

let ultimaLinea = null;

// 🔔 TOAST
function showToast(msg="Nuevo dato"){
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  }, 2000);
}

// 📡 CARGAR
async function cargarDatos(){

  try{

    // 🔥 fetch SIN cache real
    const res = await fetch(URL, {
      cache: "no-store"
    });

    const text = await res.text();

    if(!text) return;

    const lineas = text.trim().split("\n");
    if(lineas.length === 0) return;

    let actual = lineas[lineas.length-1].trim();

    // 🔴 SI NO CAMBIÓ → NO HACER NADA
    if(actual === ultimaLinea){
      return;
    }

    // ✅ NUEVO DATO REAL
    ultimaLinea = actual;

    let temps = [];
    let hums = [];

    lineas.forEach(l=>{
      let t = l.match(/Temp:(\d+(\.\d+)?)/);
      let h = l.match(/Hum:(\d+)/);

      if(t && h){
        temps.push(parseFloat(t[1]));
        hums.push(parseInt(h[1]));
      }
    });

    if(temps.length === 0) return;

    let temp = temps.at(-1);
    let hum = hums.at(-1);

    // 🔊 sonido SOLO si hay dato nuevo
    document.getElementById("beep").play().catch(()=>{});

    // ✨ animación
    document.getElementById("temp").classList.add("updated");
    document.getElementById("hum").classList.add("updated");

    setTimeout(()=>{
      document.getElementById("temp").classList.remove("updated");
      document.getElementById("hum").classList.remove("updated");
    }, 300);

    // 🔔 toast SOLO cuando cambia
    showToast("Nuevo dato recibido");

    // ===== UI =====
    document.getElementById("temp").innerText = temp + " °C";
    document.getElementById("hum").innerText = hum + " %";
    document.getElementById("bar").style.width = hum + "%";

    let clima = "Normal";
    if(temp < 20) clima = "Frío ❄️";
    else if(temp > 28) clima = "Calor 🔥";

    document.getElementById("clima").innerText = clima;

    let avg = temps.reduce((a,b)=>a+b,0)/temps.length;
    document.getElementById("avg").innerText = "Prom: " + avg.toFixed(1);

    document.getElementById("maxmin").innerText =
      "Max: " + Math.max(...temps) + " / Min: " + Math.min(...temps);

    document.getElementById("last").innerText = actual;

  }catch(e){
    console.error("Error real:", e);
  }
}

// 🔁 LOOP
setInterval(cargarDatos, 5000);

// primera carga
cargarDatos();

</script>

</body>
</html>
