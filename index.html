<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ESP32 Dashboard PRO</title>

<style>

/* ===== VARIABLES ===== */
:root{
  --bg:#020617;
  --card:#0f172a;
  --text:#e2e8f0;
  --accent:#22c55e;
}

.light{
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
}

/* ===== GENERAL ===== */
body{
  background:var(--bg);
  color:var(--text);
  font-family:Arial;
  display:flex;
  justify-content:center;
  padding:20px;
  transition:.3s;
}

.container{
  width:500px;
}

/* ===== HEADER ===== */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  background:var(--accent);
  color:black;
}

/* ===== CARDS ===== */
.card{
  background:var(--card);
  padding:15px;
  margin:10px 0;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
  text-align:center;
}

.big{
  font-size:42px;
}

.bar{
  height:10px;
  background:#ccc;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:var(--accent);
}

/* ===== GRID STATS ===== */
.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  font-size:14px;
}

/* ===== TABLE ===== */
table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:6px;
  border-bottom:1px solid #ccc;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-50px);
  background:var(--accent);
  color:black;
  padding:10px;
  border-radius:10px;
  opacity:0;
  transition:.3s;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

</style>
</head>

<body>

<div class="toast" id="toast">Nuevo dato</div>

<div class="container">

<div class="header">
  <h2>🌡️ ESP32</h2>
  <button onclick="toggleMode()">🌗</button>
</div>

<div class="card">
  <div class="big" id="temp">--</div>
  <small>Temperatura</small>
</div>

<div class="card">
  <div class="big" id="hum">--</div>
  <div class="bar"><div class="fill" id="bar"></div></div>
</div>

<div class="card" id="clima">--</div>

<div class="card stats" id="stats"></div>

<div class="card">
  <b>Historial</b>
  <table id="tabla">
    <tr><th>Temp</th><th>Hum</th></tr>
  </table>
</div>

<div class="card">
  <button onclick="borrarDatos()">🗑️ Limpiar datos</button>
</div>

</div>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg">
</audio>

<script>

const URL = "https://raw.githubusercontent.com/manumartinezmm00-ctrl/detector/main/data.txt";

let ultimaLinea=null;
let datos = JSON.parse(localStorage.getItem("datos")) || [];

// ===== MODO =====
function toggleMode(){
  document.body.classList.toggle("light");
}

// ===== TOAST =====
function toast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// ===== BORRAR =====
function borrarDatos(){
  datos=[];
  localStorage.removeItem("datos");
  actualizarTabla();
}

// ===== TABLA =====
function actualizarTabla(){
  let tabla = document.getElementById("tabla");
  tabla.innerHTML = "<tr><th>Temp</th><th>Hum</th></tr>";

  datos.slice(-10).reverse().forEach(d=>{
    tabla.innerHTML += `<tr>
      <td>${d.temp}</td>
      <td>${d.hum}</td>
    </tr>`;
  });
}

// ===== STATS =====
function stats(){

  let temps = datos.map(d=>d.temp);
  if(temps.length===0) return;

  let avg = temps.reduce((a,b)=>a+b,0)/temps.length;
  let max = Math.max(...temps);
  let min = Math.min(...temps);

  document.getElementById("stats").innerHTML = `
    <div>Prom: ${avg.toFixed(1)}</div>
    <div>Max: ${max}</div>
    <div>Min: ${min}</div>
    <div>Total: ${temps.length}</div>
  `;
}

// ===== CARGAR =====
async function cargarDatos(){

  try{

    const res = await fetch(URL, {cache:"no-store"});
    const text = await res.text();

    let lineas = text.trim().split("\n");
    let actual = lineas.at(-1);

    if(actual === ultimaLinea) return;

    ultimaLinea = actual;

    let t = actual.match(/Temp:(\d+(\.\d+)?)/);
    let h = actual.match(/Hum:(\d+)/);

    if(!t || !h) return;

    let temp = parseFloat(t[1]);
    let hum = parseInt(h[1]);

    datos.push({temp, hum});
    localStorage.setItem("datos", JSON.stringify(datos));

    document.getElementById("temp").innerText = temp + " °C";
    document.getElementById("hum").innerText = hum + " %";
    document.getElementById("bar").style.width = hum + "%";

    let clima="Normal";
    if(temp<20) clima="Frío ❄️";
    else if(temp>28) clima="Calor 🔥";

    document.getElementById("clima").innerText = clima;

    stats();
    actualizarTabla();

    document.getElementById("beep").play().catch(()=>{});
    toast();

  }catch(e){
    console.error(e);
  }
}

setInterval(cargarDatos,5000);
cargarDatos();

</script>

</body>
</html>
