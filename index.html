<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard ESP32</title>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:420px;
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  background:#0f172a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  text-align:center;
}

.big{
  font-size:40px;
  transition: transform .2s ease, color .2s ease;
}

.small{
  font-size:14px;
  opacity:0.7;
}

.bar{
  height:10px;
  background:#334155;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  background:#22c55e;
  transition: width .4s ease;
}

/* animación cuando cambia */
.updated{
  animation: flash 0.5s ease;
}

@keyframes flash{
  0%{color:#22c55e; transform:scale(1.12);}
  100%{color:white; transform:scale(1);}
}

.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
  background:#22c55e;
  margin-left:8px;
}

.status{
  text-align:center;
  margin-top:10px;
  font-size:12px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>🌡️ ESP32</h1>

  <div class="card">
    <div class="big" id="temp">-- °C</div>
    <div class="small">Temperatura</div>
  </div>

  <div class="card">
    <div class="big" id="hum">-- %</div>
    <div class="small">Humedad</div>
    <div class="bar"><div class="fill" id="bar"></div></div>
  </div>

  <div class="card">
    <div id="clima">--</div>
  </div>

  <div class="card">
    <div class="small">Promedio</div>
    <div id="avg">--</div>
  </div>

  <div class="card">
    <div class="small">Máx / Mín</div>
    <div id="maxmin">--</div>
  </div>

  <div class="card">
    <div class="small">Última lectura</div>
    <div id="last">--</div>
  </div>

</div>

<!-- sonido -->
<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>

const URL = "https://raw.githubusercontent.com/manumartinezmm00-ctrl/detector/main/data.txt";

let ultimaLinea = "";
let lastUpdateTime = null;

// ===== STATUS UI =====
const status = document.createElement("div");
status.className = "status";
document.querySelector(".container").appendChild(status);

// ===== TIEMPO RELATIVO =====
function tiempoRelativo(){
  if(!lastUpdateTime) return "--";
  let diff = Math.floor((Date.now() - lastUpdateTime)/1000);
  return diff + "s";
}

// ===== CARGAR DATOS =====
async function cargarDatos(){

  try{

    status.innerText = "Actualizando...";

    const res = await fetch(URL + "?t=" + Date.now());
    const text = await res.text();

    const lineas = text.trim().split("\n");
    if(lineas.length === 0) return;

    let lineaActual = lineas[lineas.length-1];

    let temps = [];
    let hums = [];

    lineas.forEach(l=>{
      let t = l.match(/Temp:(\d+(\.\d+)?)/);
      let h = l.match(/Hum:(\d+)/);

      if(t && h){
        temps.push(parseFloat(t[1]));
        hums.push(parseInt(h[1]));
      }
    });

    if(temps.length === 0) return;

    let ultimaTemp = temps[temps.length-1];
    let ultimaHum = hums[hums.length-1];

    // ===== DETECTAR NUEVO =====
    let nuevo = lineaActual !== ultimaLinea;

    if(nuevo){
      document.getElementById("beep").play().catch(()=>{});

      document.getElementById("temp").classList.add("updated");
      document.getElementById("hum").classList.add("updated");

      setTimeout(()=>{
        document.getElementById("temp").classList.remove("updated");
        document.getElementById("hum").classList.remove("updated");
      }, 500);

      lastUpdateTime = Date.now();
      ultimaLinea = lineaActual;
    }

    // ===== UI =====
    document.getElementById("temp").innerText = ultimaTemp + " °C";
    document.getElementById("hum").innerText = ultimaHum + " %";

    document.getElementById("bar").style.width = ultimaHum + "%";

    let clima = "Normal";
    if(ultimaTemp < 20) clima = "Frío ❄️";
    else if(ultimaTemp > 28) clima = "Calor 🔥";

    document.getElementById("clima").innerHTML =
      clima + (nuevo ? ' <span class="badge">NEW</span>' : '');

    let avg = temps.reduce((a,b)=>a+b,0)/temps.length;
    document.getElementById("avg").innerText = avg.toFixed(1) + " °C";

    let max = Math.max(...temps);
    let min = Math.min(...temps);

    document.getElementById("maxmin").innerText = max + " / " + min;

    document.getElementById("last").innerText = lineaActual;

    status.innerText = "Actualizado hace " + tiempoRelativo();

  }catch(e){
    console.error(e);
    status.innerText = "Error cargando datos";
  }
}

// ===== LOOP =====
setInterval(()=>{
  cargarDatos();
}, 5000);

cargarDatos();

</script>

</body>
</html>
